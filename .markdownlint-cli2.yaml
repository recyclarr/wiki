config:
  default: true
  line-length:
    line_length: 100
    tables: false
    code_blocks: false
  no-inline-html: false
  no-duplicate-heading: false
  no-trailing-spaces:
    br_spaces: 0
  first-line-heading: false
  single-h1: false
  link-fragments: false
  no-bare-urls: false

ignores:
  # Entirely JSX table markup; markdownlint's line-length rule cannot
  # meaningfully lint it and inline disable directives require HTML comments
  # which are no longer permitted by MDX v3.
  - docs/guide/features.mdx
