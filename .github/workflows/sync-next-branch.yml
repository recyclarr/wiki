# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Sync Next Branch

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rebase-next:
    name: Rebase next onto master
    runs-on: ubuntu-latest
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.RECYCLARR_APP_ID }}
          private-key: ${{ secrets.RECYCLARR_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout
        # zizmor: ignore[artipacked] — needs credentials to push
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Rebase next onto master
        run: |
          git config user.name "recyclarr[bot]"
          git config user.email "recyclarr[bot]@users.noreply.github.com"
          git checkout next
          git rebase master
          git push --force-with-lease origin next
